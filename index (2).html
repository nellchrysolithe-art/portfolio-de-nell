<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet 1</title>
    <style>
        /* Style de base */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-image:url(13107137_5138438-768x512.jpg)
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #9c9898;
        }
        
        /* Style de la galerie */
        .galerie {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        
        .image-container {
            width: 200px;
            height: 150px;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .image-container:hover {
            transform: scale(1.05);
        }
        
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Style pour les écrans plus petits */
        @media (max-width: 768px) {
            .image-container {
                width: 150px;
                height: 120px;
            }
        }
        
        @media (max-width: 480px) {
            .image-container {
                width: 300%;
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Projet 1 </h1>
        
        <div class="galerie">
            <!-- Image 1 -->
            <div class="image-container">
                <img src="façade projet Madame MBOUMBA.png" alt="Image 1"> 
            </div>
            
            <!-- Image 2 -->
            <div class="image-container">
                <img src="Capture d'écran 2025-11-26 182531.png" alt="Image 2">
            </div>
            
            <!-- Image 3 -->
            <div class="image-container">
                <img src="Capture d'écran 2025-11-27 010415.png" alt="Image 3">
            </div>
            
            <!-- Image 4 -->
            <div class="image-container">
                <img src="Capture d'écran 2025-11-27 010437.png" alt="Image 4">
            </div>
        </div>
    </div>
</body>
</html>
